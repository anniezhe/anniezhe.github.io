[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy-Report-Only = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://googletagmanager.com; style-src 'self' 'unsafe-inline' https://googleapis.com; img-src 'self' data: https://google-analytics.com https://googletagmanager.com; connect-src 'self' https://google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com https://*.substack.com; font-src 'self' https://gstatic.com; frame-src 'self' https://calendly.com;"
